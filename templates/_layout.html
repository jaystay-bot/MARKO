<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title|default('MARKO') }}</title>
<style>
  :root {
    --bg:#0d0f10; --panel:#15191c; --panel2:#1c2125; --border:#2a3138;
    --text:#e6edf3; --muted:#8d99a6; --accent:#00d68f; --accent-dim:#0a6b48;
    --warn:#ffb627; --danger:#ff5c5c; --link:#4cc2ff;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
       margin:0;background:var(--bg);color:var(--text);line-height:1.4}
  header{padding:14px 18px;background:var(--panel);border-bottom:1px solid var(--border);
         display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{margin:0;font-size:18px;letter-spacing:0.08em;color:var(--accent)}
  header a{color:var(--muted);text-decoration:none;font-size:13px;margin-right:14px}
  header a:hover{color:var(--text)}
  main{padding:16px;max-width:900px;margin:0 auto}
  .section{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
  .section h2{margin:0 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:0.1em;
              color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .btn{background:var(--accent);color:#001b10;border:none;padding:8px 14px;border-radius:4px;
       cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-decoration:none;display:inline-block}
  .btn:hover{background:#00f0a0}
  .btn.muted{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
  .btn.muted:hover{background:var(--border);color:var(--text)}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  .btn.danger:hover{background:var(--danger);color:#fff}
  pre{background:var(--panel2);padding:10px;border-radius:4px;white-space:pre-wrap;
      font-family:inherit;font-size:13px;line-height:1.45}
  code{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--link)}
  .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;
        background:var(--panel2);border:1px solid var(--border)}
  .pill.confirmed{background:#0a3a26;color:#4ade80;border-color:#4ade8044}
  .pill.inferred{background:#3a2a0a;color:#ffb627;border-color:#ffb62744}
  .pill.needs{background:#2a2a3a;color:#8d99a6;border-color:#8d99a644}
  .leak-row{padding:8px 10px;border-left:3px solid var(--border);background:var(--panel2);
            border-radius:4px;margin:6px 0}
  .leak-row.confirmed{border-left-color:#4ade80}
  .leak-row.inferred{border-left-color:#ffb627}
  .leak-row.needs{border-left-color:#8d99a6}
  .leak-label{font-weight:600;font-size:13px}
  .leak-basis{color:var(--muted);font-size:11px;margin-top:2px}
  .offer-box{background:linear-gradient(180deg,#0e1a14,#0a0f0c);
             border:1px solid var(--accent-dim);border-radius:6px;padding:12px;margin-top:10px}
  .offer-kind{font-size:18px;font-weight:700;color:var(--accent)}
  .offer-price{color:var(--text);font-size:15px;margin-top:4px}
  .offer-basis{color:var(--muted);font-size:11px;margin-top:4px}
  .breadcrumb{color:var(--muted);font-size:12px;margin-bottom:10px}
  .breadcrumb a{color:var(--link);text-decoration:none}
  /* Mockup card styles — shared by every niche/variant include */
  .mk{background:#fff;color:#111;border-radius:8px;padding:20px;max-width:380px;
      margin:10px auto;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  .mk-badge{display:inline-block;background:#c2410c;color:#fff;padding:3px 10px;
            border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.08em;margin-bottom:10px}
  .mk-name{margin:0 0 4px;font-size:22px;font-weight:700;line-height:1.1}
  .mk-sub{color:#555;font-size:13px;margin-bottom:14px}
  .mk-cta{display:block;text-align:center;padding:12px 14px;border-radius:6px;
          text-decoration:none;font-weight:700;margin:8px 0;font-size:15px}
  .mk-cta-call{background:#111;color:#fff}
  .mk-cta-sub{background:#fff;color:#111;border:2px solid #111}
  .mk-cta-book{background:#0e7c5a;color:#fff}
  .mk-cta-phone{background:#fff;color:#0e7c5a;border:2px solid #0e7c5a;font-size:13px}
  .mk-feat{font-size:12px;color:#444;margin:4px 0 8px;padding-left:4px}
  .mk-foot{font-size:10px;color:#999;text-align:center;margin-top:14px;border-top:1px solid #eee;padding-top:8px}
  /* Mobile call mode */
  .m-page{max-width:480px;margin:0 auto;padding:12px}
  .m-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
  .m-name{font-size:20px;font-weight:700;color:var(--text)}
  .m-sub{color:var(--muted);font-size:13px;margin-top:2px}
  .m-tel{display:flex;align-items:center;justify-content:center;gap:8px;
         font-size:22px;font-weight:700;background:var(--accent);color:#001b10;
         padding:18px;border-radius:8px;text-decoration:none;margin-top:10px;min-height:60px}
  .m-tel:hover{background:#00f0a0}
  .m-leak{background:#3a2a0a;color:#ffb627;border:1px solid #ffb62744;
          padding:10px;border-radius:6px;font-size:14px}
  .m-leak-title{font-size:10px;letter-spacing:0.1em;color:#ffb627aa;text-transform:uppercase;margin-bottom:4px}
  .m-opener{background:var(--panel2);padding:12px;border-left:3px solid var(--accent);
            border-radius:4px;font-size:14px;line-height:1.5}
  .m-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
  .m-actions form{margin:0}
  .m-actions .btn{width:100%;padding:14px;min-height:48px}
  @media(max-width:640px){main{padding:10px}header h1{font-size:16px}.section{padding:10px}}
</style>
</head>
<body>
<header>
  <h1>MARKO</h1>
  <nav>
    <a href="/">← Home</a>
    {% if lead_id %}<a href="/lead/{{ lead_id }}/leak">Leak</a>
    <a href="/lead/{{ lead_id }}/mockup">Mockup</a>
    <a href="/lead/{{ lead_id }}/pitch">Pitch</a>
    <a href="/m/lead/{{ lead_id }}">Mobile</a>{% endif %}
  </nav>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
