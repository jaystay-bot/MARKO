<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title|default('MARKO') }}</title>
<style>
  @font-face {
    font-family: "InterVar";
    src: url("/static/InterVariable.woff2") format("woff2-variations"),
         url("/static/InterVariable.woff2") format("woff2");
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  :root {
    --bg:#0a0c0e; --bg-elev:#10141a; --panel:#141a21; --panel2:#1b232c;
    --border:#232c36; --border-strong:#2f3a47;
    --text:#e8eef5; --muted:#8a98a8; --accent:#00d68f; --accent-strong:#00ffa6; --accent-dim:#0a6b48;
    --warn:#ffb627; --danger:#ff5c5c; --link:#4cc2ff;
    --radius:10px; --radius-sm:6px;
    --shadow-card:0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 24px -16px rgba(0,0,0,0.6);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:"InterVar",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
       font-feature-settings:"cv11","ss01","ss03";
       margin:0;
       background:
         radial-gradient(1100px 600px at 0% -10%, #0e1a14 0%, transparent 60%),
         radial-gradient(900px 500px at 110% 0%, #0c1422 0%, transparent 55%),
         var(--bg);
       background-attachment:fixed;
       color:var(--text);line-height:1.45;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  header{padding:12px 20px;background:rgba(16,20,26,0.85);
         backdrop-filter:saturate(160%) blur(10px);
         -webkit-backdrop-filter:saturate(160%) blur(10px);
         border-bottom:1px solid var(--border);
         position:sticky;top:0;z-index:40;
         display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{margin:0;font-size:16px;letter-spacing:0.16em;font-weight:700;
            background:linear-gradient(90deg,var(--accent) 0%,#4cc2ff 100%);
            -webkit-background-clip:text;background-clip:text;color:transparent}
  header a{color:var(--muted);text-decoration:none;font-size:12.5px;font-weight:500;
           padding:6px 10px;border-radius:6px;transition:background 120ms,color 120ms}
  header a:hover{color:var(--text);background:rgba(255,255,255,0.04)}
  main{padding:18px;max-width:900px;margin:0 auto}
  .section{background:linear-gradient(180deg,var(--panel) 0%,var(--bg-elev) 100%);
           border:1px solid var(--border);border-radius:var(--radius);
           padding:16px;margin-bottom:18px;box-shadow:var(--shadow-card)}
  .section h2{margin:0 0 14px;font-size:12px;text-transform:uppercase;letter-spacing:0.14em;
              color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:10px;font-weight:600}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .btn{background:var(--accent);color:#00120b;border:none;padding:8px 14px;border-radius:var(--radius-sm);
       cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;text-decoration:none;display:inline-block;
       letter-spacing:0.01em;transition:background 120ms,transform 80ms,box-shadow 120ms}
  .btn:hover{background:var(--accent-strong);box-shadow:0 0 0 3px rgba(0,214,143,0.18)}
  .btn:active{transform:translateY(1px)}
  .btn.muted{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  .btn.muted:hover{background:var(--bg-elev);border-color:var(--border-strong);color:var(--text);box-shadow:none}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(255,92,92,0.4)}
  .btn.danger:hover{background:rgba(255,92,92,0.12);color:#ffb0b0;border-color:var(--danger);box-shadow:none}
  pre{background:var(--panel2);padding:12px;border-radius:var(--radius-sm);white-space:pre-wrap;
      font-family:inherit;font-size:13px;line-height:1.5}
  code{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--link);
       background:rgba(76,194,255,0.08);padding:1px 5px;border-radius:4px}
  .pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;
        background:var(--panel2);border:1px solid var(--border);line-height:1.5}
  .pill.confirmed{background:rgba(74,222,128,0.12);color:#4ade80;border-color:rgba(74,222,128,0.3)}
  .pill.inferred{background:rgba(255,182,39,0.12);color:var(--warn);border-color:rgba(255,182,39,0.32)}
  .pill.needs{background:var(--panel2);color:var(--muted);border-color:var(--border)}
  .leak-row{padding:10px 12px;border-left:3px solid var(--border);background:var(--panel2);
            border-radius:var(--radius-sm);margin:8px 0;transition:border-color 120ms}
  .leak-row.confirmed{border-left-color:#4ade80;background:linear-gradient(90deg,rgba(74,222,128,0.06) 0%,var(--panel2) 100%)}
  .leak-row.inferred{border-left-color:var(--warn);background:linear-gradient(90deg,rgba(255,182,39,0.06) 0%,var(--panel2) 100%)}
  .leak-row.needs{border-left-color:#8d99a6}
  .leak-label{font-weight:600;font-size:13px;letter-spacing:0.01em}
  .leak-basis{color:var(--muted);font-size:11px;margin-top:3px}
  .offer-box{background:
              radial-gradient(400px 160px at 100% 0%,rgba(0,214,143,0.08) 0%,transparent 60%),
              linear-gradient(180deg,#0e1a14,#0a0f0c);
             border:1px solid rgba(0,214,143,0.25);border-radius:var(--radius);padding:14px;margin-top:12px;
             box-shadow:var(--shadow-card)}
  .offer-kind{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.01em}
  .offer-price{color:var(--text);font-size:15px;margin-top:4px}
  .offer-basis{color:var(--muted);font-size:11px;margin-top:4px}
  .breadcrumb{color:var(--muted);font-size:12px;margin-bottom:10px}
  .breadcrumb a{color:var(--link);text-decoration:none}
  /* Mockup card styles — shared by every niche/variant include */
  .mk{background:#fff;color:#111;border-radius:8px;padding:20px;max-width:380px;
      margin:10px auto;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      box-shadow:0 4px 20px rgba(0,0,0,0.4)}
  .mk-badge{display:inline-block;background:#c2410c;color:#fff;padding:3px 10px;
            border-radius:4px;font-size:11px;font-weight:700;letter-spacing:0.08em;margin-bottom:10px}
  .mk-name{margin:0 0 4px;font-size:22px;font-weight:700;line-height:1.1}
  .mk-sub{color:#555;font-size:13px;margin-bottom:14px}
  .mk-cta{display:block;text-align:center;padding:12px 14px;border-radius:6px;
          text-decoration:none;font-weight:700;margin:8px 0;font-size:15px}
  .mk-cta-call{background:#111;color:#fff}
  .mk-cta-sub{background:#fff;color:#111;border:2px solid #111}
  .mk-cta-book{background:#0e7c5a;color:#fff}
  .mk-cta-phone{background:#fff;color:#0e7c5a;border:2px solid #0e7c5a;font-size:13px}
  .mk-feat{font-size:12px;color:#444;margin:4px 0 8px;padding-left:4px}
  .mk-foot{font-size:10px;color:#999;text-align:center;margin-top:14px;border-top:1px solid #eee;padding-top:8px}
  /* Mobile call mode — one-thumb operator panel */
  .m-page{max-width:480px;margin:0 auto;padding:14px;padding-bottom:24px}
  .m-card{background:linear-gradient(180deg,var(--panel) 0%,var(--bg-elev) 100%);
          border:1px solid var(--border);border-radius:var(--radius);
          padding:16px;margin-bottom:12px;box-shadow:var(--shadow-card)}
  .m-name{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.01em;line-height:1.2}
  .m-sub{color:var(--muted);font-size:13px;margin-top:4px}
  .m-tel{display:flex;align-items:center;justify-content:center;gap:10px;
         font-size:22px;font-weight:700;
         background:linear-gradient(135deg,var(--accent) 0%,var(--accent-strong) 100%);
         color:#00120b;
         padding:18px;border-radius:var(--radius);text-decoration:none;margin-top:14px;
         min-height:60px;
         box-shadow:0 8px 24px -8px rgba(0,214,143,0.5),0 1px 0 rgba(255,255,255,0.15) inset;
         transition:transform 80ms,box-shadow 120ms}
  .m-tel:hover{box-shadow:0 12px 28px -8px rgba(0,214,143,0.6),0 1px 0 rgba(255,255,255,0.2) inset}
  .m-tel:active{transform:translateY(1px)}
  .m-leak{background:linear-gradient(90deg,rgba(255,182,39,0.12) 0%,rgba(255,182,39,0.04) 100%);
          color:var(--warn);border:1px solid rgba(255,182,39,0.3);
          padding:12px 14px;border-radius:var(--radius-sm);font-size:14px;line-height:1.45}
  .m-leak-title{font-size:10px;letter-spacing:0.14em;color:rgba(255,182,39,0.75);
                text-transform:uppercase;margin-bottom:6px;font-weight:600}
  .m-opener{background:var(--panel2);padding:14px;border-left:3px solid var(--accent);
            border-radius:var(--radius-sm);font-size:14px;line-height:1.55;color:var(--text)}
  .m-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .m-actions form{margin:0}
  .m-actions .btn{width:100%;padding:14px;min-height:48px;display:flex;align-items:center;justify-content:center}
  @media(max-width:640px){main{padding:12px}header h1{font-size:14px;letter-spacing:0.14em}.section{padding:12px}
    header{padding:10px 14px}}
</style>
</head>
<body>
<header>
  <h1>MARKO</h1>
  <nav>
    <a href="/">← Home</a>
    {% if lead_id %}<a href="/lead/{{ lead_id }}/leak">Leak</a>
    <a href="/lead/{{ lead_id }}/mockup">Mockup</a>
    <a href="/lead/{{ lead_id }}/pitch">Pitch</a>
    <a href="/m/lead/{{ lead_id }}">Mobile</a>{% endif %}
  </nav>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
